services:
  frontend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bookverse-frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_PROXY_TARGET=http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
